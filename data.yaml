# ─────────────────────────────────────────────────────────────────────────────
# SafeGuard AI – YOLOv8 Dataset Configuration
# data.yaml
#
# DATASET SOURCES:
#   PPE Detection:
#     - https://universe.roboflow.com/roboflow-universe-projects/hard-hat-universe
#     - https://universe.roboflow.com/proyek-akhir-mikrotik/construction-safety-gsnvb
#     - https://universe.roboflow.com/new-workspace-wqunn/ppe-detection-jhbpq
#
#   Fire & Smoke Detection:
#     - https://www.kaggle.com/datasets/phylake1337/fire-dataset
#     - https://universe.roboflow.com/roboflow-100/wildfire-smoke
#     - https://universe.roboflow.com/test-hvhce/fire-and-smoke-detection-kxmzj
#
# STRUCTURE (after downloading & combining):
#   datasets/
#     safety/
#       images/
#         train/    ← training images
#         val/      ← validation images
#         test/     ← test images (optional)
#       labels/
#         train/    ← YOLO format .txt annotations
#         val/
#         test/
#
# ─────────────────────────────────────────────────────────────────────────────

# Absolute path to dataset root (update this to your local path)
path: datasets/safety

# Relative paths from 'path'
train: images/train
val:   images/val
test:  images/test   # optional

# Number of classes
nc: 8

# Class names — ORDER MATTERS (must match label indices)
names:
  0: person
  1: helmet
  2: no_helmet
  3: vest
  4: no_vest
  5: fire
  6: smoke
  7: fall

# ─────────────────────────────────────────────────────────────────────────────
# LABEL FORMAT (YOLO):
#   <class_id> <x_center> <y_center> <width> <height>
#   All values normalized 0–1 relative to image dimensions
#
# EXAMPLE annotation file (image_001.txt):
#   0 0.512 0.614 0.134 0.320    ← person
#   1 0.511 0.490 0.090 0.060    ← helmet
#   3 0.510 0.620 0.110 0.080    ← vest
#
# ─────────────────────────────────────────────────────────────────────────────
# QUICK DOWNLOAD USING ROBOFLOW API:
#
#   from roboflow import Roboflow
#   rf = Roboflow(api_key="YOUR_API_KEY")
#   project = rf.workspace("roboflow-universe-projects").project("hard-hat-universe")
#   dataset  = project.version(1).download("yolov8")
#
# ─────────────────────────────────────────────────────────────────────────────
# TRAINING COMMAND (from project root):
#
#   python train.py --epochs 40 --batch 16 --device 0
#
# OR using ultralytics CLI directly:
#
#   yolo detect train model=yolov8n.pt data=data.yaml epochs=40 imgsz=640 batch=16
#
# ─────────────────────────────────────────────────────────────────────────────
